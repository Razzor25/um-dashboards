name: Techdocs Build and Publish

# Controls when the workflow will run
on:
  # Triggers the workflow on push to mkdocs file or docs folder
  push:
    branches:
      - 'main'
    paths:
      - 'mkdocs.yaml'
      - 'docs/**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  techdocs-cd:
    uses: optum-ecp/ecp-actions-workflows/.github/workflows/techdocs.yml@main
    secrets: inherit
