name: Promote Secrets - optumcare-curo-dashboards-um-tr-ui (Manual Deploy)
'on':
  workflow_dispatch:
    inputs:
      env-name:
        description: Environment to promote to
        default: dev-optumcare
        options:
        - dev-optumcare
        - test-optumcare
        - stage-optumcare
        - trn-optumcare
        - prod-optumcare
        - dev1-optumcare
        type: choice
      change-ticket:
        description: Change Ticket Number
        default: ''
        type: string
    
jobs:
  promote-secrets-optumcare-curo-dashboards-um-tr-ui:
    if: ${{ inputs.env-name == 'dev-optumcare' || inputs.env-name == 'test-optumcare' || inputs.env-name == 'stage-optumcare' || inputs.env-name == 'prod-optumcare' }}
    uses: optum-ecp/ecp-actions-workflows/.github/workflows/promote-secrets.yml@main
    with:
      env-name: ${{ inputs.env-name }}
      argo-app-name: optumcare-curo-dashboards-um-tr-ui
      change-ticket: ${{ inputs.change-ticket }}
      vault-secret-name: optumcare-curo-dashboards-um-tr-ui
    secrets: inherit
    
  promote-secrets-optumcare-curo-dashboards-um-tr-ui-trn:
      if: ${{ inputs.env-name == 'trn-optumcare' }} 
      uses: optum-ecp/ecp-actions-workflows/.github/workflows/promote-secrets.yml@main
      with:
        env-name: ${{ inputs.env-name }}
        argo-app-name: optumcare-curo-dashboards-um-tr-ui
        change-ticket: ${{ inputs.change-ticket }}
        vault-secret-name: optumcare-curo-dashboards-um-tr-ui-trn
      secrets: inherit
      
  promote-secrets-optumcare-curo-dashboards-um-tr-ui-dev1:
    if: ${{ inputs.env-name == 'dev1-optumcare' }} 
    uses: optum-ecp/ecp-actions-workflows/.github/workflows/promote-secrets.yml@main
    with:
      env-name: ${{ inputs.env-name }}
      argo-app-name: optumcare-curo-dashboards-um-tr-ui
      change-ticket: ${{ inputs.change-ticket }}
      vault-secret-name: optumcare-curo-dashboards-um-tr-ui-dev1
    secrets: inherit
  
